services:
  - type: web
    name: portfolio-tracker-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npx prisma migrate deploy && (npm run seed || true) && node src/server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

databases:
  - name: portfolio-db
    plan: free
